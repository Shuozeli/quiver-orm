repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace --all-targets
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test (offline)
        entry: cargo test --workspace
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: no-credentials
        name: check for leaked credentials
        entry: '(?i)(yuacx|docker\.yuacx|cyuan@|prisma-rs-private)'
        language: pygrep
        types_or: [rust, toml, markdown, yaml]
        exclude: '\.pre-commit-config\.yaml$'

      - id: no-internal-refs
        name: check for internal references
        entry: '(?i)(prisma-rs/quiver|/home/cyuan|CLAUDE\.md|docs/internal|beu resume|beu pause|\.beu/)'
        language: pygrep
        types_or: [rust, toml, markdown, yaml]
        exclude: '\.pre-commit-config\.yaml$'

      - id: no-gitignored-files
        name: check for files that should be gitignored
        language: script
        entry: scripts/check-no-gitignored.sh
        always_run: true
        pass_filenames: false
